<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Teklif V6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Admin-specific styles */
        body {
            background: var(--bg-main);
        }

        .admin-header {
            background: linear-gradient(135deg, #0f1620, #1a2332);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--color-accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header .logo-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .admin-header .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .admin-header h1 {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .admin-header h1 span {
            color: var(--color-accent);
        }

        .admin-header .badge {
            background: var(--color-danger);
            color: #fff;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .admin-header .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-sm);
            color: rgba(255, 255, 255, 0.7);
            font-family: var(--font-sans);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .admin-header .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .admin-header .back-btn svg {
            width: 16px;
            height: 16px;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }

        .admin-section {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            margin-bottom: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .admin-section-header {
            padding: 18px 24px;
            background: var(--bg-input);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-section-header h2 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .admin-section-header .section-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .admin-section-body {
            padding: 24px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .admin-grid-wide {
            grid-template-columns: 1fr;
        }

        .admin-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .admin-field label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .admin-field input,
        .admin-field textarea {
            padding: 10px 14px;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.88rem;
            font-weight: 500;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .admin-field textarea {
            min-height: 80px;
            resize: vertical;
            line-height: 1.5;
        }

        .admin-field input:focus,
        .admin-field textarea:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-glow);
        }

        .admin-field .field-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .admin-room-row {
            display: grid;
            grid-template-columns: 2fr 80px 100px;
            gap: 12px;
            align-items: end;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .admin-room-row:last-child {
            border-bottom: none;
        }

        .admin-actions {
            position: sticky;
            bottom: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border-light);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.06);
            z-index: 50;
        }

        .admin-actions .save-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(200, 165, 90, 0.25);
        }

        .admin-actions .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(200, 165, 90, 0.35);
        }

        .admin-actions .save-btn svg {
            width: 18px;
            height: 18px;
        }

        .admin-actions .reset-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1.5px solid var(--border-medium);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-actions .reset-btn:hover {
            border-color: var(--color-danger);
            color: var(--color-danger);
        }

        .save-toast {
            position: fixed;
            top: 80px;
            right: 24px;
            padding: 14px 24px;
            background: var(--color-success);
            color: #fff;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: var(--shadow-xl);
            transform: translateX(120%);
            transition: transform 0.35s ease;
            z-index: 9999;
        }

        .save-toast.show {
            transform: translateX(0);
        }

        @media (max-width: 640px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }

            .admin-room-row {
                grid-template-columns: 1fr 1fr;
            }

            .admin-actions {
                flex-direction: column;
            }

            .admin-header {
                flex-wrap: wrap;
                gap: 12px;
            }
        }
    </style>
</head>

            'cfg_en_m2_5', 'cfg_en_m2_6', 'cfg_en_m2_7', 'cfg_en_m2_8',
            'cfg_en_add1', 'cfg_en_add2', 'cfg_en_add3', 'cfg_en_add4',
            'cfg_en_add5', 'cfg_en_add6', 'cfg_en_add7', 'cfg_en_add8',
            // Commission & taxes
            'cfg_commission', 'cfg_secondPerson', 'cfg_vat', 'cfg_accTax',
            'cfg_service', 'cfg_deposit',
            // Hotel info
            'cfg_checkin', 'cfg_checkout', 'cfg_parking', 'cfg_gallery',
            // Lounge
            'cfg_lounge_breakfast', 'cfg_lounge_tea', 'cfg_lounge_dinner', 'cfg_lounge_age',
            // Price type texts
            'cfg_nonref_tr', 'cfg_nonref_en', 'cfg_flex_tr', 'cfg_flex_en',
            'cfg_corporate_tr', 'cfg_corporate_en'
        ];

        // Load saved config
        function loadConfig() {
            const saved = localStorage.getItem(CONFIG_KEY);
            if (!saved) return;
            try {
                const config = JSON.parse(saved);
                FIELDS.forEach(id => {
                    const el = document.getElementById(id);
                    if (el && config[id] !== undefined) {
                        el.value = config[id];
                    }
                });
            } catch (e) { }
        }

        // Save config
        function saveConfig() {
            const config = {};
            FIELDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) config[id] = el.value;
            });
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));

            // Show toast
            const toast = document.getElementById('saveToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Reset to defaults
        function resetConfig() {
            if (confirm('Tüm ayarlar varsayılan değerlere sıfırlanacak. Emin misiniz?')) {
                localStorage.removeItem(CONFIG_KEY);
                location.reload();
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            document.getElementById('saveBtn').addEventListener('click', saveConfig);
            document.getElementById('resetBtn').addEventListener('click', resetConfig);
        });
    </script>

</body>

</html>
